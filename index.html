<aside class="w-full md:w-72 flex-shrink-0">
    <div class="sidebar-sticky space-y-8">
        <div>
            <h3 class="font-black text-[11px] uppercase tracking-[0.2em] text-slate-400 mb-6">Filter by Category</h3>
            <div class="space-y-3" id="typeFilters">
                <label class="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-2xl cursor-pointer hover:border-indigo-500 transition group">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="Grant" onchange="filterData()" class="w-5 h-5 rounded-md border-slate-300 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-bold text-slate-700 group-hover:text-indigo-600">Grants</span>
                    </div>
                    <span id="count-Grant" class="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-md">0</span>
                </label>
                
                <label class="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-2xl cursor-pointer hover:border-indigo-500 transition group">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="Loan" onchange="filterData()" class="w-5 h-5 rounded-md border-slate-300 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-bold text-slate-700 group-hover:text-indigo-600">Loans</span>
                    </div>
                    <span id="count-Loan" class="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-md">0</span>
                </label>

                <label class="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-2xl cursor-pointer hover:border-indigo-500 transition group">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="Subsidy" onchange="filterData()" class="w-5 h-5 rounded-md border-slate-300 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-bold text-slate-700 group-hover:text-indigo-600">Subsidies</span>
                    </div>
                    <span id="count-Subsidy" class="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-md">0</span>
                </label>

                <label class="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-2xl cursor-pointer hover:border-indigo-500 transition group">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="Equity" onchange="filterData()" class="w-5 h-5 rounded-md border-slate-300 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-bold text-slate-700 group-hover:text-indigo-600">Equity & VC</span>
                    </div>
                    <span id="count-Equity" class="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-md">0</span>
                </label>
            </div>
        </div>

        <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-8 rounded-[2.5rem] text-white shadow-xl">
            <h4 class="font-black text-xl mb-3">Expert Filing</h4>
            <p class="text-indigo-100 text-sm leading-relaxed mb-6">We handle your documentation and application process.</p>
            <a href="https://wa.me/917039196489" class="block text-center bg-white text-indigo-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-50 transition">WhatsApp Us</a>
        </div>
    </div>
</aside>

<script>
    let rawData = [];

    async function loadData() {
        try {
            const response = await fetch('grants.json');
            rawData = await response.json();
            
            // Calculate and display Sidebar Counts immediately on load
            updateSidebarCounts(rawData);
            
            filterData();
        } catch (e) {
            console.error("JSON Load Error:", e);
        }
    }

    function updateSidebarCounts(data) {
        const types = ['Grant', 'Loan', 'Subsidy', 'Equity'];
        types.forEach(type => {
            const count = data.filter(item => item.type === type).length;
            const el = document.getElementById(`count-${type}`);
            if(el) el.innerText = count;
        });
    }

    function filterData() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const sortOrder = document.getElementById('sortOrder').value;
        const checkedTypes = Array.from(document.querySelectorAll('#typeFilters input:checked')).map(cb => cb.value);

        let filtered = rawData.filter(item => {
            const name = item.name || "";
            const provider = item.provider || "";
            const matchesSearch = name.toLowerCase().includes(searchTerm) || 
                                 provider.toLowerCase().includes(searchTerm);
            const matchesType = checkedTypes.length === 0 || checkedTypes.includes(item.type);
            return matchesSearch && matchesType;
        });

        if (sortOrder === 'alpha') {
            filtered.sort((a, b) => a.name.localeCompare(b.name));
        }

        render(filtered);
    }

    function render(data) {
        const grid = document.getElementById('grants-grid');
        const noResults = document.getElementById('no-results');
        document.getElementById('count-label').innerText = `${data.length} Schemes Matching Your Needs`;

        if (data.length === 0) {
            grid.innerHTML = "";
            noResults.classList.remove('hidden');
            return;
        }

        noResults.classList.add('hidden');
        grid.innerHTML = data.map(item => `
            <div class="grant-card flex flex-col">
                <div class="flex justify-between items-start mb-6">
                    <span class="bg-indigo-50 text-indigo-700 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">${item.type}</span>
                    <div class="text-right">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Value</p>
                        <p class="text-xl font-black text-green-600 tracking-tighter">${item.amount}</p>
                    </div>
                </div>
                <h3 class="text-xl font-black leading-tight text-slate-900 mb-2">${item.name}</h3>
                <p class="text-slate-500 text-sm font-medium mb-8">${item.provider}</p>
                <div class="mt-auto pt-6 border-t border-slate-50 flex items-center justify-between">
                     <span class="text-[11px] text-slate-400 font-bold"><i class="fa fa-clock mr-1.5"></i> ${item.deadline}</span>
                     <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition hover:bg-indigo-600">Apply Now</a>
                </div>
            </div>
        `).join('');
    }

    loadData();
</script>
