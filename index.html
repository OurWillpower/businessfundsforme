<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | 200+ Startup Schemes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .news-ticker-container { background: #1e1b4b; overflow: hidden; position: relative; z-index: 40; }
        .news-ticker { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 80s linear infinite; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        .grant-card {
            background: #ffffff !important;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.2s ease;
        }
        .grant-card:hover { border-color: #6366f1; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }

        /* Sidebar Sticky Fix */
        @media (min-width: 768px) {
            .sidebar { position: sticky; top: 120px; height: calc(100vh - 140px); }
        }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white border-b border-slate-200 py-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="Willpower" class="h-12 md:h-16 w-auto">
                <h1 class="font-black text-xl tracking-tighter hidden md:block">BusinessFundsForMe</h1>
            </div>
            <div class="flex-1 max-w-md mx-8 hidden lg:block">
                <div class="relative">
                    <i class="fa fa-search absolute left-4 top-3.5 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search by name, provider or keyword..." 
                           class="w-full pl-12 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            <a href="mailto:care@worldofwillpower.com" class="text-indigo-600 font-bold text-xs uppercase tracking-widest">Support</a>
        </div>
    </nav>

    <div class="news-ticker-container py-2">
        <div class="news-ticker text-white text-[10px] font-bold uppercase tracking-widest">
            🚀 200+ SCHEMES VERIFIED FOR 2026 • ⚡ SIDBI VENTURE CAPITAL FUND OPEN • 📢 WORLD OF WILLPOWER INITIATIVE
        </div>
    </div>

    <main class="container mx-auto px-6 py-8 flex flex-col md:flex-row gap-8">
        
        <aside class="w-full md:w-64 flex-shrink-0">
            <div class="sidebar space-y-8">
                <div>
                    <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 mb-4">Funding Type</h3>
                    <div class="space-y-2" id="typeFilters">
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded-xl cursor-pointer transition">
                            <input type="checkbox" value="Grant" onchange="filterData()" class="w-4 h-4 rounded text-indigo-600">
                            <span class="text-sm font-semibold">Grants</span>
                        </label>
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded-xl cursor-pointer transition">
                            <input type="checkbox" value="Loan" onchange="filterData()" class="w-4 h-4 rounded text-indigo-600">
                            <span class="text-sm font-semibold">Loans</span>
                        </label>
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded-xl cursor-pointer transition">
                            <input type="checkbox" value="Subsidy" onchange="filterData()" class="w-4 h-4 rounded text-indigo-600">
                            <span class="text-sm font-semibold">Subsidies</span>
                        </label>
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded-xl cursor-pointer transition">
                            <input type="checkbox" value="Equity" onchange="filterData()" class="w-4 h-4 rounded text-indigo-600">
                            <span class="text-sm font-semibold">Equity/VC</span>
                        </label>
                    </div>
                </div>

                <div class="bg-indigo-50 p-6 rounded-3xl">
                    <h4 class="font-black text-indigo-900 text-sm mb-2">Need Assistance?</h4>
                    <p class="text-indigo-700 text-xs leading-relaxed mb-4">Our experts help you with documentation and filing.</p>
                    <a href="https://wa.me/917039196489" class="block text-center bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-tighter">WhatsApp Us</a>
                </div>
            </div>
        </aside>

        <div class="flex-1">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black tracking-tight" id="count-label">Available Schemes</h2>
                <select id="sortOrder" onchange="filterData()" class="bg-transparent border-none font-bold text-sm text-indigo-600 outline-none cursor-pointer">
                    <option value="new">Newest First</option>
                    <option value="alpha">Alphabetical</option>
                </select>
            </div>

            <div id="grants-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                </div>

            <div id="no-results" class="hidden text-center py-20">
                <i class="fa fa-search text-4xl text-slate-200 mb-4"></i>
                <p class="text-slate-500 font-bold">No schemes match your search or filters.</p>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];

        async function loadData() {
            try {
                const response = await fetch('grants.json');
                rawData = await response.json();
                filterData(); // Initial render
            } catch (e) {
                document.getElementById('grants-grid').innerHTML = "<p class='text-red-500'>Error loading database.</p>";
            }
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortOrder = document.getElementById('sortOrder').value;
            
            // Get selected types from checkboxes
            const checkedTypes = Array.from(document.querySelectorAll('#typeFilters input:checked')).map(cb => cb.value);

            let filtered = rawData.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm) || 
                                     item.provider.toLowerCase().includes(searchTerm);
                const matchesType = checkedTypes.length === 0 || checkedTypes.includes(item.type);
                return matchesSearch && matchesType;
            });

            // Sorting
            if (sortOrder === 'alpha') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            }

            render(filtered);
        }

        function render(data) {
            const grid = document.getElementById('grants-grid');
            const noResults = document.getElementById('no-results');
            document.getElementById('count-label').innerText = `${data.length} Available Schemes`;

            if (data.length === 0) {
                grid.innerHTML = "";
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = data.map(item => `
                <div class="grant-card flex flex-col">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-slate-100 text-slate-600 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${item.type}</span>
                        <p class="text-green-600 font-black text-lg tracking-tighter">${item.amount}</p>
                    </div>
                    <h3 class="text-lg font-black leading-tight text-slate-900 mb-1">${item.name}</h3>
                    <p class="text-slate-400 text-xs font-bold uppercase mb-6">${item.provider}</p>
                    <div class="mt-auto flex items-center justify-between">
                         <span class="text-[10px] text-slate-400 font-bold"><i class="fa fa-calendar-alt mr-1"></i> ${item.deadline}</span>
                         <a href="${item.link}" target="_blank" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold text-[11px] uppercase transition hover:bg-indigo-700">Apply</a>
                    </div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
