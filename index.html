<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Funding Strategy Experts</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero-premium">
    <div class="container">
        <h1>Find Funding For YOUR Business</h1>
        <p class="sub">Government • Private • Global</p>

        <div class="flash-bar">
            🔥 Select your sector below & discover funding instantly
        </div>
    </div>
</section>

<!-- INTERACTIVE SECTION -->
<section class="section center">
    <div class="container">
        <h2>🔍 Find Schemes By Sector</h2>

        <select id="sector" onchange="showSchemes()">
            <option value="">Select Your Sector</option>
            <option value="agri">Agriculture</option>
            <option value="manufacturing">Manufacturing</option>
            <option value="startup">Startup / Tech</option>
            <option value="food">Food Processing</option>
        </select>

        <div id="results"></div>
    </div>
</section>

<!-- FORM -->
<section class="section" id="form">
    <div class="container form-premium">
        <h2>Get Full Funding Strategy</h2>

        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="tel" placeholder="WhatsApp Number" required>
            <button class="btn-premium">Get Details</button>
        </form>
    </div>
</section>

<script src="script.js"></script>

</body>
</html>
