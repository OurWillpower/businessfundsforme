<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | Startup Grants India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-white border-b border-gray-200 py-4 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">BusinessFundsForMe</h1>
            </div>
            <div class="hidden md:flex gap-6 text-sm font-medium text-slate-600">
                <a href="#" class="hover:text-indigo-600 transition">Latest Grants</a>
                <a href="#" class="hover:text-indigo-600 transition">Guides</a>
                <a href="https://github.com/OurWillpower" class="bg-indigo-600 text-white px-4 py-2 rounded-full hover:bg-indigo-700 transition">Submit Grant</a>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-900 py-16 px-6 text-center text-white">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">India's Largest Grant Directory</h2>
        <p class="text-indigo-200 text-lg max-w-2xl mx-auto">Discover government schemes, private grants, and acceleration funds for your startup.</p>
    </header>

    <main class="container mx-auto px-6 -mt-10 pb-20">
        <div id="grants-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 bg-white rounded-3xl shadow-xl">
                <p class="text-slate-400 animate-pulse text-xl font-medium">Fetching the latest funds...</p>
            </div>
        </div>
    </main>

    <script>
        async function fetchGrants() {
            try {
                // This looks for your JSON file in the same repo
                const response = await fetch('grants.json');
                const data = await response.json();
                const grid = document.getElementById('grants-grid');
                grid.innerHTML = '';

                data.forEach(item => {
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-2xl transition-all duration-300 border border-slate-100 flex flex-col h-full">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-green-100 text-green-700 text-xs px-3 py-1 rounded-full font-bold uppercase">${item.type}</span>
                                <span class="text-xs text-slate-400"><i class="far fa-calendar-alt mr-1"></i> ${item.deadline}</span>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 mb-2">${item.name}</h3>
                            <p class="text-slate-500 text-sm mb-4 flex-grow">${item.provider}</p>
                            <div class="border-t border-slate-50 pt-4 mt-auto">
                                <div class="flex justify-between items-center">
                                    <span class="text-2xl font-black text-indigo-600">${item.amount}</span>
                                    <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-600 transition">Apply</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('grants-grid').innerHTML = '<p class="text-center col-span-full text-red-500">Error loading data. Please check grants.json</p>';
            }
        }
        fetchGrants();
    </script>
</body>
</html>
