<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | Startup Grant Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-white border-b border-slate-200 py-3 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center">
                <img src="logo.png" alt="Willpower" class="h-8 w-auto mr-2">
                <span class="hidden sm:inline font-bold text-slate-700 tracking-tight">BusinessFundsForMe</span>
            </div>
            <div class="flex gap-4">
                <a href="#newsletter" class="hidden md:block text-indigo-600 font-semibold py-2 px-4 text-sm">Alerts</a>
                <a href="https://github.com/OurWillpower" target="_blank" class="bg-slate-900 text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-indigo-600 transition">Submit Grant</a>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-900 pt-16 pb-24 px-6 text-center">
        
        <div class="mb-8 flex justify-center">
            <div class="bg-white p-4 rounded-2xl shadow-2xl inline-block">
                <img src="logo.png" alt="Willpower Full Logo" class="h-28 w-auto object-contain" onerror="this.src='https://ui-avatars.com/api/?name=Will+Power&background=6366f1&color=fff'">
            </div>
        </div>

        <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-4 tracking-tight">India's Largest Grant Directory</h2>
        <p class="text-indigo-100 text-lg max-w-2xl mx-auto mb-10">Searching 50+ Government schemes for Indian Entrepreneurs.</p>
        
        <div class="container mx-auto max-w-4xl relative z-10">
            <div class="bg-white p-2 rounded-2xl shadow-2xl flex flex-col md:flex-row gap-2">
                <div class="flex-grow flex items-center px-4 bg-slate-50 rounded-xl border border-transparent focus-within:border-indigo-300 transition">
                    <i class="fas fa-search text-slate-400 mr-3"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, provider, or industry..." class="w-full py-4 bg-transparent outline-none text-slate-700">
                </div>
                <select id="filterType" class="bg-slate-50 p-4 rounded-xl outline-none font-medium text-slate-600 border-none cursor-pointer">
                    <option value="All">All Categories</option>
                    <option value="Grant">Grants</option>
                    <option value="Loan">Loans</option>
                    <option value="Subsidy">Subsidies</option>
                    <option value="Accelerator">Accelerators</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div id="grants-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer id="newsletter" class="bg-white border-t border-slate-200 py-12">
        <div class="container mx-auto px-6 text-center">
            <div class="max-w-md mx-auto mb-8">
                <h3 class="text-xl font-bold mb-2">Get Weekly Alerts</h3>
                <div class="flex gap-2">
                    <input type="email" placeholder="email@example.com" class="flex-grow p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <button class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold">Join</button>
                </div>
            </div>
            <p class="text-slate-500 text-sm italic">"Atma-shakti Muladhanam" - Powered by Willpower</p>
            <p class="text-slate-400 text-xs mt-4">© 2026 BusinessFundsForMe. All information is for educational purposes.</p>
        </div>
    </footer>

    <script>
        let allGrants = [];
        async function fetchGrants() {
            try {
                const response = await fetch('grants.json');
                allGrants = await response.json();
                renderGrants(allGrants);
            } catch (e) {
                document.getElementById('grants-grid').innerHTML = '<p class="col-span-full text-center py-20 text-red-500">Error loading data. Make sure grants.json exists.</p>';
            }
        }

        function renderGrants(data) {
            const grid = document.getElementById('grants-grid');
            grid.innerHTML = data.length ? '' : '<p class="col-span-full text-center py-20 text-slate-400">No matching grants found.</p>';
            data.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest">${item.type}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase">${item.deadline}</span>
                        </div>
                        <h3 class="text-xl font-extrabold text-slate-900 mb-2 leading-tight">${item.name}</h3>
                        <p class="text-slate-500 text-sm mb-6 flex-grow">${item.provider}</p>
                        <div class="pt-4 border-t flex justify-between items-center">
                            <div>
                                <span class="block text-[10px] text-slate-400 font-bold uppercase">Amount</span>
                                <span class="text-xl font-black text-green-600">${item.amount}</span>
                            </div>
                            <a href="${item.link}" target="_blank" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold hover:bg-slate-900 transition shadow-lg shadow-indigo-100 text-sm">Apply Now</a>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderGrants(allGrants.filter(g => g.name.toLowerCase().includes(term) || g.provider.toLowerCase().includes(term)));
        });

        document.getElementById('filterType').addEventListener('change', (e) => {
            const type = e.target.value;
            renderGrants(type === 'All' ? allGrants : allGrants.filter(g => g.type.includes(type)));
        });

        fetchGrants();
    </script>
</body>
</html>
