<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        .brand-font { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.04em;
            color: #1e1b4b;
            text-shadow: 1px 1px 0px #cbd5e1, 2px 2px 0px #94a3b8, 3px 3px 0px rgba(30, 27, 75, 0.1);
        }

        .ticker-wrap { background: #1e1b4b; color: white; padding: 10px 0; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 60s linear infinite; font-weight: 800; font-size: 10px; letter-spacing: 1.5px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .grant-card { background: white; border-radius: 32px; padding: 32px; border: 1px solid #e2e8f0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; display: flex; flex-direction: column; }
        .grant-card:hover { transform: translateY(-10px); border-color: #4f46e5; box-shadow: 0 30px 60px -12px rgba(79, 70, 229, 0.15); }
        
        .expert-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        /* Sleeker Search Bar */
        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .search-input {
            padding: 1.25rem 1.5rem 1.25rem 3.5rem;
            border-radius: 1.5rem;
            font-size: 1rem;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="text-slate-900">

    <div class="ticker-wrap">
        <div class="ticker uppercase">
            🚀 200+ SCHEMES VERIFIED • ⚡ SIDBI VENTURE CAPITAL OPEN • 🏦 MUDRA LOANS UPDATED • 📢 WORLD OF WILLPOWER INITIATIVE • ⚡ NEW STARTUP GRANTS LIVE
        </div>
    </div>

    <nav class="bg-white border-b py-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="/" class="flex items-center gap-4 group">
                <img src="logo.png" class="h-12 w-auto" alt="Logo">
                <span class="text-3xl brand-font leading-none">BusinessFundsForMe</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="https://wa.me/917039196489" class="bg-slate-100 text-slate-600 px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-slate-200 transition">Partner Login</a>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-950 pt-16 pb-28 px-6 text-center text-white relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="container mx-auto max-w-3xl relative z-10">
            <h1 class="text-5xl md:text-6xl font-[900] mb-6 leading-[1.1] tracking-tighter">Your Funding <span class="text-indigo-400">Search Engine.</span></h1>
            
            <div class="search-container relative group">
                <i class="fa fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-400 transition-colors"></i>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search 'Mudra', 'Grant', or 'Startup'..." 
                       class="search-input w-full text-slate-900 outline-none shadow-xl font-semibold focus:border-indigo-400 placeholder:text-slate-300">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 -mt-12 pb-24 flex flex-col md:flex-row gap-10 relative z-20">
        <aside class="w-full md:w-72 space-y-8">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100">
                <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-slate-400 mb-4">Funding Type</h3>
                <div id="typeFilters" class="space-y-2.5"></div>
            </div>

            <div class="space-y-4">
                <div>
                    <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-3 px-2">Industry Sector</h3>
                    <select id="industryFilter" onchange="filterData()" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold text-sm text-slate-700 outline-none focus:border-indigo-500 shadow-sm">
                        <option value="All">All Industries</option>
                        <option value="IT">IT & Software</option>
                        <option value="Manufacturing">Manufacturing</option>
                        <option value="Agriculture">Agriculture</option>
                        <option value="Healthcare">Healthcare</option>
                    </select>
                </div>
            </div>

            <button onclick="resetFilters()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-[9px] font-black text-slate-400 hover:bg-white transition uppercase tracking-widest">Clear Filters</button>
        </aside>

        <div class="flex-1">
            <h2 id="count-label" class="text-2xl font-[900] text-slate-900 tracking-tight mb-6">Available Schemes</h2>
            <div id="grants-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
            <div id="no-results" class="hidden text-center py-24 bg-white rounded-[3rem] border border-slate-100">
                <p class="text-slate-400 font-bold text-xl mb-8">No matching schemes found.</p>
                <button onclick="resetFilters()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg">Show All</button>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        const typeCategories = ["Loan", "Subsidy", "Equity", "Grant"];

        async function loadData() {
            try {
                const res = await fetch('grants.json');
                rawData = await res.json();
            } catch (e) { console.error("JSON Error"); }
            filterData();
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const indFilter = document.getElementById('industryFilter').value.toLowerCase();
            const checkedTypes = Array.from(document.querySelectorAll('#typeFilters input:checked')).map(c => c.value.toLowerCase());

            let filtered = rawData.filter(item => {
                const itemType = (item.type || "").toLowerCase();
                const matchesType = checkedTypes.length === 0 || checkedTypes.some(t => itemType.includes(t));
                const itemInds = Array.isArray(item.industry) ? item.industry.map(i => i.toLowerCase()) : [(item.industry || "all").toLowerCase()];
                const matchesInd = indFilter === "all" || itemInds.some(i => i.includes(indFilter));
                const matchesSearch = !search || item.name.toLowerCase().includes(search);
                return matchesType && matchesInd && matchesSearch;
            });

            updateSidebar(checkedTypes);
            renderGrid(filtered);
        }

        function updateSidebar(checked) {
            document.getElementById('typeFilters').innerHTML = typeCategories.map(type => {
                const count = rawData.filter(i => i.type.includes(type)).length;
                return `
                <label class="flex items-center justify-between p-3.5 bg-slate-50 border border-transparent rounded-xl cursor-pointer hover:bg-white hover:border-indigo-100 transition mb-2">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" value="${type}" ${checked.includes(type.toLowerCase()) ? 'checked' : ''} onchange="filterData()" class="w-5 h-5 rounded text-indigo-600">
                        <span class="text-xs font-extrabold text-slate-700">${type}s</span>
                    </div>
                    <span class="text-[10px] font-black text-slate-300 bg-white px-2 py-0.5 rounded-md">${count}</span>
                </label>`;
            }).join('');
        }

        function renderGrid(data) {
            const grid = document.getElementById('grants-grid');
            const noResults = document.getElementById('no-results');
            document.getElementById('count-label').innerText = `${data.length} Schemes Available`;
            
            if (data.length === 0) {
                grid.innerHTML = ""; noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                grid.innerHTML = data.map(item => `
                    <div class="grant-card">
                        <div class="flex justify-between items-start mb-5">
                            <span class="bg-indigo-50 text-indigo-600 text-[9px] font-black px-3 py-1.5 rounded-lg uppercase tracking-widest">${item.sector || 'Public'}</span>
                            <p class="text-[#10b981] font-black text-xl tracking-tighter">${item.amount}</p>
                        </div>
                        <h3 class="text-xl font-black text-slate-900 leading-tight mb-2">${item.name}</h3>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-6">${item.provider}</p>
                        
                        <div class="mt-auto space-y-2.5">
                            <a href="https://wa.me/917039196489?text=Expert%20help%20needed%20for%20${encodeURIComponent(item.name)}" 
                               class="expert-btn block w-full text-center text-white py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition active:scale-95">
                               Apply Through Our Experts
                            </a>
                            <a href="${item.link}" target="_blank" 
                               class="block w-full text-center text-slate-400 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest hover:text-slate-600 transition">
                               Apply On Your Own
                            </a>
                        </div>
                    </div>
                `).join('');
            }
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('industryFilter').value = "All";
            document.querySelectorAll('#typeFilters input').forEach(c => c.checked = false);
            filterData();
        }

        loadData();
    </script>
</body>
</html>
