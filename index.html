<body class="text-slate-900">

    <nav class="bg-white border-b py-4 sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-3 hover:opacity-80 transition">
                    <img src="logo.png" class="h-10" alt="Logo">
                    <span class="font-black text-xl tracking-tighter">BusinessFundsForMe</span>
                </a>
            </div>
            <div class="flex items-center gap-6">
                <a href="/" class="hidden md:block text-xs font-black uppercase tracking-widest text-slate-400 hover:text-indigo-600">Home</a>
                <a href="https://wa.me/917039196489" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-xs uppercase tracking-widest">Support</a>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-900 pt-16 pb-24 px-6 text-center text-white">
        <div class="container mx-auto max-w-3xl">
            <h1 class="text-4xl md:text-6xl font-black mb-4">Search <span class="text-indigo-400">200+ Schemes.</span></h1>
            <div class="relative">
                <i class="fa fa-search absolute left-5 top-5 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Try searching 'Mudra' or 'Grant'..." 
                       class="w-full p-5 pl-14 rounded-2xl text-slate-900 outline-none shadow-2xl font-medium">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex flex-col md:flex-row gap-10">
        <div class="flex-1">
            <div class="flex justify-between items-center mb-8">
                <h2 id="count-label" class="text-xl font-black">All Schemes</h2>
            </div>

            <div id="grants-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
            
            <div id="no-results" class="hidden text-center py-20 bg-white rounded-[2rem] border-2 border-dashed border-slate-100">
                <i class="fa fa-search text-slate-200 text-5xl mb-4"></i>
                <p class="text-slate-400 font-bold mb-6">We couldn't find a match for that.</p>
                <button onclick="resetFilters()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest">Show All Schemes</button>
            </div>
        </div>
    </main>

    <script>
        // NEW: Fuzzy/Phonetic Match Function
        function isPhoneticMatch(str, target) {
            if (!str) return false;
            const s = str.toLowerCase().replace(/h/g, ''); // Simple phonetic: treat mudhra and mudra the same
            const t = target.toLowerCase().replace(/h/g, '');
            return s.includes(t) || t.includes(s);
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const ind = document.getElementById('industryFilter').value;
            const sec = document.getElementById('sectorFilter').value;
            const state = document.getElementById('stateFilter').value;
            const checkedTypes = Array.from(document.querySelectorAll('#typeFilters input:checked')).map(c => c.value);

            let filtered = rawData.filter(item => {
                // 1. Phonetic Search (Handles Mudra/Mudhra)
                const matchesSearch = !search || 
                    isPhoneticMatch(item.name, search) || 
                    isPhoneticMatch(item.provider, search);
                
                // 2. Safety: If data is missing fields, they still show up under "All"
                const matchesType = checkedTypes.length === 0 || checkedTypes.includes(item.type);
                
                const itemInd = Array.isArray(item.industry) ? item.industry : [item.industry || "All"];
                const matchesInd = ind === "All" || itemInd.includes(ind);
                
                const matchesSec = sec === "All" || (item.sector || "Public") === sec;
                const matchesState = state === "All" || (item.state || "All India") === state;

                return matchesSearch && matchesType && matchesInd && matchesSec && matchesState;
            });

            renderGrid(filtered);
            updateSidebar(checkedTypes, ind, sec, state);
        }

        function renderGrid(data) {
            const grid = document.getElementById('grants-grid');
            const noResults = document.getElementById('no-results');
            document.getElementById('count-label').innerText = `${data.length} Schemes Available`;
            
            if (data.length === 0) {
                grid.innerHTML = "";
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                grid.innerHTML = data.map(item => `
                    <div class="grant-card">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-2 py-1 rounded uppercase">${item.type}</span>
                            <p class="text-green-600 font-black text-lg">${item.amount}</p>
                        </div>
                        <h3 class="text-lg font-black text-slate-900 leading-tight mb-1">${item.name}</h3>
                        <p class="text-slate-400 text-xs font-bold uppercase mb-4">${item.provider}</p>
                        <div class="mt-auto pt-4 border-t flex items-center justify-between">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">${item.state || 'All India'}</span>
                            <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-black text-[10px] uppercase">Apply</a>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Rest of the script functions (loadData, updateSidebar, resetFilters) remain the same
    </script>
</body>
