<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .ticker-wrap { background: #1e1b4b; color: white; padding: 12px 0; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 50s linear infinite; font-weight: 800; font-size: 12px; letter-spacing: 1px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        /* Logo & Brand Refinement */
        .brand-logo { height: 75px; width: auto; object-fit: contain; } /* Significantly larger logo */
        .brand-name { font-size: 2rem; font-weight: 800; letter-spacing: -0.05em; color: #1e1b4b; }
        
        .grant-card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #e2e8f0; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .grant-card:hover { transform: translateY(-8px); border-color: #6366f1; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-slate-900">

    <div class="ticker-wrap">
        <div class="ticker uppercase">
            🚀 200+ SCHEMES VERIFIED • ⚡ SIDBI VENTURE CAPITAL OPEN • 🏦 MUDRA LOANS UPDATED • 📢 WORLD OF WILLPOWER INITIATIVE
        </div>
    </div>

    <nav class="bg-white border-b py-6 sticky top-0 z-50">
    <div class="container mx-auto px-6 flex justify-between items-center">
        <a href="/" class="flex items-center gap-6 group">
            <img src="logo.png" class="h-20 w-auto transition-transform group-hover:scale-105" alt="Willpower Logo">
            <span class="text-3xl font-[900] tracking-tighter text-[#1e1b4b]">BusinessFundsForMe</span>
        </a>
        <div class="flex items-center gap-8">
            <a href="/" class="text-xs font-black uppercase tracking-[0.2em] text-slate-400 hover:text-indigo-600 transition">Home</a>
            <a href="https://wa.me/917039196489" class="bg-[#4f46e5] text-white px-8 py-3.5 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition">Support</a>
        </div>
    </div>
</nav>

    <header class="bg-indigo-950 pt-20 pb-32 px-6 text-center text-white">
        <div class="container mx-auto max-w-3xl">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6 leading-tight tracking-tight">Access <span class="text-indigo-400">Startup Capital.</span></h1>
            <div class="relative max-w-2xl mx-auto">
                <i class="fa fa-search absolute left-6 top-6 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Phonetic Search: Try 'Mudhra' or 'Grant'..." 
                       class="w-full p-6 pl-16 rounded-[2rem] text-slate-900 outline-none shadow-2xl text-lg font-semibold border-4 border-white focus:border-indigo-400 transition-all">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-16 flex flex-col md:flex-row gap-12">
        <aside class="w-full md:w-80 space-y-10">
            <div>
                <h3 class="font-extrabold text-[11px] uppercase tracking-widest text-slate-400 mb-5">Funding Type</h3>
                <div id="typeFilters" class="space-y-3">
                    </div>
            </div>

            <div>
                <h3 class="font-extrabold text-[11px] uppercase tracking-widest text-slate-400 mb-3">Industry</h3>
                <select id="industryFilter" onchange="filterData()" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500">
                    <option value="All">All Industries</option>
                    <option value="IT & Tech">IT & Software</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Healthcare">Healthcare</option>
                </select>
            </div>

            <div>
                <h3 class="font-extrabold text-[11px] uppercase tracking-widest text-slate-400 mb-3">Funding Sector</h3>
                <select id="sectorFilter" onchange="filterData()" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500">
                    <option value="All">All Sectors</option>
                    <option value="Public">Government / Public</option>
                    <option value="Private">Private / VC</option>
                    <option value="Bank">Bank / Institutional</option>
                </select>
            </div>

            <button onclick="resetFilters()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-xs font-bold text-slate-400 hover:bg-slate-50 transition">RESET ALL FILTERS</button>
        </aside>

        <div class="flex-1">
            <h2 id="count-label" class="text-2xl font-extrabold mb-10 text-slate-900">Schemes Available</h2>
            <div id="grants-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
            <div id="no-results" class="hidden text-center py-24 bg-white rounded-[3rem] border-4 border-dashed border-slate-50">
                <p class="text-slate-400 font-bold text-xl mb-6">No matching schemes found.</p>
                <button onclick="resetFilters()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-extrabold text-xs">Show All</button>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        const categories = ["Grant", "Loan", "Subsidy", "Equity"];

        async function loadData() {
            try {
                const res = await fetch('grants.json');
                rawData = await res.json();
            } catch (e) { console.error("JSON missing"); }
            filterData();
        }

        function isPhoneticMatch(str, target) {
            if (!str) return false;
            const s = str.toLowerCase().replace(/h/g, '');
            const t = target.toLowerCase().replace(/h/g, '');
            return s.includes(t) || t.includes(s);
        }

        // IMPROVED MAPPING LOGIC
        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const ind = document.getElementById('industryFilter').value;
            const sec = document.getElementById('sectorFilter').value;
            const checkedTypes = Array.from(document.querySelectorAll('#typeFilters input:checked')).map(c => c.value);

            let filtered = rawData.filter(item => {
                // Search Logic (Phonetic)
                const matchesSearch = !search || isPhoneticMatch(item.name, search) || isPhoneticMatch(item.provider, search);
                
                // Type Logic
                const matchesType = checkedTypes.length === 0 || checkedTypes.includes(item.type);
                
                // Flexible Industry Mapping
                const itemInds = Array.isArray(item.industry) ? item.industry.map(i => i.toLowerCase()) : [(item.industry || "General").toLowerCase()];
                const matchesInd = ind === "All" || itemInds.includes(ind.toLowerCase());
                
                // Flexible Sector Mapping
                const itemSec = (item.sector || "Public").toLowerCase();
                const matchesSec = sec === "All" || itemSec === sec.toLowerCase();

                return matchesSearch && matchesType && matchesInd && matchesSec;
            });

            updateSidebar(checkedTypes, search, ind, sec);
            renderGrid(filtered);
        }

        function updateSidebar(checked, search, ind, sec) {
            document.getElementById('typeFilters').innerHTML = categories.map(cat => {
                const count = rawData.filter(i => {
                    const itemInds = Array.isArray(i.industry) ? i.industry.map(x => x.toLowerCase()) : [(i.industry || "General").toLowerCase()];
                    const mInd = ind === "All" || itemInds.includes(ind.toLowerCase());
                    const mSec = sec === "All" || (i.sector || "Public").toLowerCase() === sec.toLowerCase();
                    return i.type === cat && mInd && mSec && (!search || isPhoneticMatch(i.name, search));
                }).length;

                return `
                <label class="flex items-center justify-between p-4 bg-white border-2 border-slate-50 rounded-2xl cursor-pointer hover:border-indigo-100 transition shadow-sm">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" value="${cat}" ${checked.includes(cat) ? 'checked' : ''} onchange="filterData()" class="w-5 h-5 rounded-lg text-indigo-600">
                        <span class="text-sm font-bold text-slate-700">${cat}s</span>
                    </div>
                    <span class="text-[10px] font-black text-slate-300">(${count})</span>
                </label>`;
            }).join('');
        }

        function renderGrid(data) {
            const grid = document.getElementById('grants-grid');
            const noResults = document.getElementById('no-results');
            document.getElementById('count-label').innerText = `${data.length} Schemes Available`;
            
            if (data.length === 0) {
                grid.innerHTML = ""; noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                grid.innerHTML = data.map(item => `
                    <div class="grant-card">
                        <div class="flex justify-between items-start mb-6">
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-extrabold px-3 py-1.5 rounded-xl uppercase tracking-widest">${item.sector || 'Public'}</span>
                            <p class="text-green-600 font-extrabold text-xl">${item.amount}</p>
                        </div>
                        <h3 class="text-xl font-extrabold text-slate-900 leading-tight mb-2">${item.name}</h3>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-8">${item.provider}</p>
                        <div class="mt-auto pt-6 border-t border-slate-50 flex items-center justify-between">
                            <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest">${item.type}</span>
                            <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-7 py-3 rounded-2xl font-extrabold text-[10px] uppercase hover:bg-indigo-600 transition">Apply Now</a>
                        </div>
                    </div>
                `).join('');
            }
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('industryFilter').value = "All";
            document.getElementById('sectorFilter').value = "All";
            document.querySelectorAll('#typeFilters input').forEach(c => c.checked = false);
            filterData();
        }

        loadData();
    </script>
</body>
</html>
