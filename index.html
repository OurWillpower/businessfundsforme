<!DOCTYPE html>
<html>
<head>
<title>BusinessFundsForMe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="container nav-flex">
        <div class="logo">BusinessFundsForMe</div>
    </div>
</nav>

<section class="hero">
    <div class="container center">

        <h1>Find Funding For Your Business</h1>
        <p class="sub">Government • Private • Global</p>

        <div class="finder-box">

            <select id="sector">
                <option value="">Select Sector</option>
                <option value="startup">Startup / Tech</option>
                <option value="msme">MSME / Manufacturing</option>
                <option value="agri">Agriculture</option>
                <option value="food">Food Processing</option>
            </select>

            <select id="stage">
                <option value="">Select Stage</option>
                <option value="idea">Idea</option>
                <option value="growth">Growth</option>
            </select>

            <button onclick="findFunding()">Find Funding</button>

        </div>

        <div id="results"></div>

    </div>
</section>

<section class="cta">
    <h2>Need Help Applying?</h2>
    <a href="https://wa.me/917039196489">Talk on WhatsApp</a>
</section>

<script src="script.js"></script>

</body>
</html>
