<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .grant-card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #e2e8f0; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .grant-card:hover { transform: translateY(-5px); border-color: #6366f1; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .filter-select { width: 100%; padding: 0.75rem; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-weight: 700; font-size: 0.875rem; outline: none; transition: 0.2s; }
        .filter-select:focus { border-color: #6366f1; ring: 2px ring-indigo-500; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white border-b py-4 sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="h-10" alt="Logo">
                <span class="font-black text-xl tracking-tighter">BusinessFundsForMe</span>
            </div>
            <a href="https://wa.me/917039196489" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-xs uppercase tracking-widest">Support</a>
        </div>
    </nav>

    <header class="bg-indigo-900 pt-16 pb-24 px-6 text-center text-white">
        <div class="container mx-auto max-w-3xl">
            <h1 class="text-4xl md:text-6xl font-black mb-4">Search <span class="text-indigo-400">200+ Schemes.</span></h1>
            <p class="text-indigo-200 mb-10 font-medium">Filtered access to Government Grants, Private Equity, and Low-Interest Loans.</p>
            <div class="relative">
                <i class="fa fa-search absolute left-5 top-5 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search by scheme name, provider, or keyword..." 
                       class="w-full p-5 pl-14 rounded-2xl text-slate-900 outline-none shadow-2xl font-medium">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex flex-col md:flex-row gap-10">
        
        <aside class="w-full md:w-72 flex-shrink-0 space-y-8">
            <div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400">Funding Type</h3>
                    <button onclick="resetFilters()" class="text-[10px] font-black text-indigo-600">RESET</button>
                </div>
                <div id="typeFilters" class="space-y-2"></div>
            </div>

            <div>
                <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-3">Industry</h3>
                <select id="industryFilter" onchange="filterData()" class="filter-select">
                    <option value="All">All Industries</option>
                    <option value="IT & Tech">IT & Software</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Women-Led">Women-Led</option>
                </select>
            </div>

            <div>
                <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-3">Sector</h3>
                <select id="sectorFilter" onchange="filterData()" class="filter-select">
                    <option value="All">All Sectors</option>
                    <option value="Public">Government / Public</option>
                    <option value="Private">Private / VC</option>
                    <option value="Bank">Banking / Institutional</option>
                </select>
            </div>

            <div>
                <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-3">Target Region</h3>
                <select id="stateFilter" onchange="filterData()" class="filter-select">
                    <option value="All">Pan India</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Delhi">Delhi</option>
                </select>
            </div>
        </aside>

        <div class="flex-1">
            <div class="flex justify-between items-center mb-8">
                <h2 id="count-label" class="text-xl font-black">All Schemes</h2>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-slate-400">SORT:</span>
                    <select id="sortOrder" onchange="filterData()" class="text-xs font-bold text-indigo-600 bg-transparent border-none outline-none">
                        <option value="new">Latest</option>
                        <option value="alpha">A-Z</option>
                    </select>
                </div>
            </div>

            <div id="grants-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
            <div id="no-results" class="hidden text-center py-20 text-slate-400 font-bold">No schemes match your selected filters.</div>
        </div>
    </main>

    <script>
        let rawData = [];
        const categories = ["Grant", "Loan", "Subsidy", "Equity"];

        async function loadData() {
            try {
                const response = await fetch('grants.json');
                rawData = await response.json();
            } catch (e) {
                console.error("JSON missing or broken. Using internal fallback.");
                // Fallback data so the site never looks broken
                rawData = [
                    { name: "Startup India Seed Fund", type: "Grant", amount: "₹50 Lakhs", provider: "DPIIT", industry: ["IT & Tech"], sector: "Public", state: "All India", link: "#", deadline: "Open" },
                    { name: "Stand-Up India Loan", type: "Loan", amount: "₹1 Crore", provider: "SIDBI", industry: ["Manufacturing"], sector: "Bank", state: "All India", link: "#", deadline: "Open" }
                ];
            }
            filterData();
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const ind = document.getElementById('industryFilter').value;
            const sec = document.getElementById('sectorFilter').value;
            const state = document.getElementById('stateFilter').value;
            const sort = document.getElementById('sortOrder').value;
            const checkedTypes = Array.from(document.querySelectorAll('#typeFilters input:checked')).map(c => c.value);

            let filtered = rawData.filter(item => {
                const matchesSearch = (item.name + item.provider).toLowerCase().includes(search);
                const matchesType = checkedTypes.length === 0 || checkedTypes.includes(item.type);
                const matchesInd = ind === "All" || (Array.isArray(item.industry) ? item.industry.includes(ind) : item.industry === ind);
                const matchesSec = sec === "All" || item.sector === sec;
                const matchesState = state === "All" || item.state === state;
                return matchesSearch && matchesType && matchesInd && matchesSec && matchesState;
            });

            if (sort === 'alpha') filtered.sort((a, b) => a.name.localeCompare(b.name));

            updateSidebar(checkedTypes, ind, sec, state);
            renderGrid(filtered);
        }

        function updateSidebar(checked, ind, sec, state) {
            document.getElementById('typeFilters').innerHTML = categories.map(cat => {
                // Count how many match the current dropdown filters
                const count = rawData.filter(i => {
                    const mInd = ind === "All" || (Array.isArray(i.industry) ? i.industry.includes(ind) : i.industry === ind);
                    const mSec = sec === "All" || i.sector === sec;
                    const mState = state === "All" || i.state === state;
                    return i.type === cat && mInd && mSec && mState;
                }).length;

                return `
                <label class="flex items-center justify-between p-3 bg-white border border-slate-100 rounded-xl cursor-pointer hover:border-indigo-300 transition">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" value="${cat}" ${checked.includes(cat) ? 'checked' : ''} onchange="filterData()" class="w-4 h-4 rounded text-indigo-600">
                        <span class="text-sm font-bold text-slate-700">${cat}s</span>
                    </div>
                    <span class="text-[10px] font-black text-slate-300">(${count})</span>
                </label>`;
            }).join('');
        }

        function renderGrid(data) {
            const grid = document.getElementById('grants-grid');
            document.getElementById('count-label').innerText = `${data.length} Matching Schemes`;
            
            if (data.length === 0) {
                grid.innerHTML = "";
                document.getElementById('no-results').classList.remove('hidden');
            } else {
                document.getElementById('no-results').classList.add('hidden');
                grid.innerHTML = data.map(item => {
                    const tags = Array.isArray(item.industry) ? item.industry : [item.industry || "General"];
                    return `
                    <div class="grant-card">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-2 py-1 rounded uppercase tracking-tighter">${item.type}</span>
                            <p class="text-green-600 font-black text-lg">₹ ${item.amount.replace('₹', '')}</p>
                        </div>
                        <h3 class="text-lg font-black text-slate-900 leading-tight mb-1">${item.name}</h3>
                        <p class="text-slate-400 text-xs font-bold uppercase mb-4">${item.provider}</p>
                        <div class="flex flex-wrap gap-1 mb-6">
                            ${tags.map(t => `<span class="bg-slate-100 text-slate-500 text-[9px] px-2 py-1 rounded font-bold">${t}</span>`).join('')}
                            <span class="bg-slate-900 text-white text-[9px] px-2 py-1 rounded font-bold uppercase tracking-tighter">${item.sector || 'Public'}</span>
                        </div>
                        <div class="mt-auto pt-4 border-t flex items-center justify-between">
                            <span class="text-[10px] text-slate-400 font-bold uppercase"><i class="fa fa-map-marker-alt mr-1"></i> ${item.state || 'All India'}</span>
                            <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-black text-[10px] uppercase hover:bg-indigo-600 transition">Apply Now</a>
                        </div>
                    </div>`;
                }).join('');
            }
        }

        function resetFilters() {
            document.getElementById('industryFilter').value = "All";
            document.getElementById('sectorFilter').value = "All";
            document.getElementById('stateFilter').value = "All";
            document.getElementById('searchInput').value = "";
            document.querySelectorAll('#typeFilters input').forEach(c => c.checked = false);
            filterData();
        }

        loadData();
    </script>
</body>
</html>
