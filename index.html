<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | 200+ Startup Schemes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .grant-card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #e2e8f0; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .grant-card:hover { transform: translateY(-5px); border-color: #6366f1; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white border-b py-4 sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3">
                <img src="logo.png" class="h-10" alt="Willpower Logo">
                <span class="font-black text-xl tracking-tighter">BusinessFundsForMe</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="/" class="text-xs font-bold text-slate-400 hover:text-indigo-600 uppercase">Home</a>
                <a href="https://wa.me/917039196489" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-[10px] uppercase">Support</a>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-900 pt-16 pb-24 px-6 text-center text-white">
        <div class="container mx-auto max-w-3xl">
            <h1 class="text-4xl md:text-6xl font-black mb-4">Find Your <span class="text-indigo-400">Capital.</span></h1>
            <div class="relative max-w-xl mx-auto">
                <i class="fa fa-search absolute left-5 top-5 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Try searching 'Mudra'..." 
                       class="w-full p-5 pl-14 rounded-2xl text-slate-900 outline-none shadow-2xl font-bold">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex flex-col md:flex-row gap-10">
        <aside class="w-full md:w-72 space-y-8">
            <div>
                <h3 class="font-black text-[10px] uppercase text-slate-400 mb-4 tracking-widest">Industry</h3>
                <select id="industryFilter" onchange="filterData()" class="w-full p-4 bg-white border rounded-2xl font-bold text-sm">
                    <option value="All">All Industries</option>
                    <option value="IT & Tech">IT & Tech</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Healthcare">Healthcare</option>
                </select>
            </div>
            
            <div id="typeFilters" class="space-y-2">
                </div>
        </aside>

        <div class="flex-1">
            <h2 id="count-label" class="text-xl font-black mb-8">Schemes</h2>
            <div id="grants-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
            
            <div id="no-results" class="hidden text-center py-20 bg-white rounded-3xl border-2 border-dashed">
                <p class="text-slate-400 font-bold mb-4">No exact matches found.</p>
                <button onclick="window.location.reload()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">Reset All Filters</button>
            </div>
        </div>
    </main>

    <script>
        let rawData = [
            { name: "Pradhan Mantri Mudra Yojana", type: "Loan", amount: "₹10 Lakhs", provider: "PMMY", industry: "General", link: "https://www.mudra.org.in/" },
            { name: "Stand-Up India Scheme", type: "Loan", amount: "₹1 Crore", provider: "SIDBI", industry: "Manufacturing", link: "https://www.standupmitra.in/" },
            { name: "Startup India Seed Fund", type: "Grant", amount: "₹50 Lakhs", provider: "DPIIT", industry: "IT & Tech", link: "https://seedfund.startupindia.gov.in/" }
        ];

        function isPhoneticMatch(str, target) {
            const s = str.toLowerCase().replace(/h/g, '');
            const t = target.toLowerCase().replace(/h/g, '');
            return s.includes(t) || t.includes(s);
        }

        function filterData() {
            const search = document.getElementById('searchInput').value;
            const ind = document.getElementById('industryFilter').value;
            
            let filtered = rawData.filter(item => {
                const matchesSearch = !search || isPhoneticMatch(item.name, search) || isPhoneticMatch(item.provider, search);
                const matchesInd = ind === "All" || item.industry === ind;
                return matchesSearch && matchesInd;
            });

            renderGrid(filtered);
        }

        function renderGrid(data) {
            const grid = document.getElementById('grants-grid');
            const noResults = document.getElementById('no-results');
            document.getElementById('count-label').innerText = `${data.length} Schemes Available`;
            
            if (data.length === 0) {
                grid.innerHTML = "";
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                grid.innerHTML = data.map(item => `
                    <div class="grant-card">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-2 py-1 rounded uppercase">${item.type}</span>
                            <p class="text-green-600 font-black text-lg">${item.amount}</p>
                        </div>
                        <h3 class="text-lg font-black text-slate-900 leading-tight mb-1">${item.name}</h3>
                        <p class="text-slate-400 text-xs font-bold uppercase mb-4">${item.provider}</p>
                        <div class="mt-auto pt-4 border-t flex items-center justify-between">
                            <span class="text-[10px] text-slate-400 font-bold">ALL INDIA</span>
                            <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-black text-[10px]">APPLY</a>
                        </div>
                    </div>
                `).join('');
            }
        }

        renderGrid(rawData);
    </script>
</body>
</html>
