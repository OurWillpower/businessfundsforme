<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .ticker-wrap { background: #1e1b4b; color: white; padding: 12px 0; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 60s linear infinite; font-weight: 800; font-size: 11px; letter-spacing: 1.5px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        /* Premium Card Styling */
        .grant-card { background: white; border-radius: 28px; padding: 28px; border: 1px solid #e2e8f0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; display: flex; flex-direction: column; }
        .grant-card:hover { transform: translateY(-10px); border-color: #4f46e5; box-shadow: 0 30px 60px -12px rgba(79, 70, 229, 0.15); }
    </style>
</head>
<body class="text-slate-900">

    <div class="ticker-wrap">
        <div class="ticker uppercase">
            🚀 200+ SCHEMES VERIFIED • ⚡ SIDBI VENTURE CAPITAL OPEN • 🏦 MUDRA LOANS UPDATED • 📢 WORLD OF WILLPOWER INITIATIVE • ⚡ NEW STARTUP GRANTS LIVE
        </div>
    </div>

    <nav class="bg-white border-b py-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="/" class="flex items-center gap-6 group">
                <img src="logo.png" class="h-16 w-auto transition-transform group-hover:scale-105" alt="Willpower Logo">
                <span class="text-3xl font-[900] tracking-tighter text-[#1e1b4b] leading-none">BusinessFundsForMe</span>
            </a>
            <div class="flex items-center gap-8">
                <a href="/" class="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-indigo-600 transition">Home</a>
                <a href="https://wa.me/917039196489" class="bg-[#4f46e5] text-white px-8 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-[0.2em] shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition active:scale-95">Support</a>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-950 pt-24 pb-40 px-6 text-center text-white relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="container mx-auto max-w-3xl relative z-10">
            <h1 class="text-6xl md:text-7xl font-[900] mb-8 leading-[1.1] tracking-tighter">Your Funding <br><span class="text-indigo-400">Search Engine.</span></h1>
            <div class="relative max-w-2xl mx-auto group">
                <i class="fa fa-search absolute left-7 top-7 text-slate-400 group-focus-within:text-indigo-400 transition-colors"></i>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search 'Mudhra', 'Grant', or 'Startup'..." 
                       class="w-full p-7 pl-16 rounded-[2.5rem] text-slate-900 outline-none shadow-2xl text-xl font-bold border-4 border-transparent focus:border-indigo-400 transition-all placeholder:text-slate-300">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 -mt-16 pb-24 flex flex-col md:flex-row gap-12 relative z-20">
        <aside class="w-full md:w-80 space-y-10">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h3 class="font-black text-[11px] uppercase tracking-[0.2em] text-slate-400 mb-6">Funding Type</h3>
                <div id="typeFilters" class="space-y-3"></div>
            </div>

            <div class="space-y-6">
                <div>
                    <h3 class="font-black text-[11px] uppercase tracking-widest text-slate-400 mb-4 px-2">Industry Sector</h3>
                    <select id="industryFilter" onchange="filterData()" class="w-full p-5 bg-white border-2 border-slate-100 rounded-3xl font-bold text-sm text-slate-700 outline-none focus:border-indigo-500 shadow-sm">
                        <option value="All">All Industries</option>
                        <option value="IT">IT & Software</option>
                        <option value="Manufacturing">Manufacturing</option>
                        <option value="Agriculture">Agriculture</option>
                        <option value="Healthcare">Healthcare</option>
                    </select>
                </div>

                <div>
                    <h3 class="font-black text-[11px] uppercase tracking-widest text-slate-400 mb-4 px-2">Provider Type</h3>
                    <select id="sectorFilter" onchange="filterData()" class="w-full p-5 bg-white border-2 border-slate-100 rounded-3xl font-bold text-sm text-slate-700 outline-none focus:border-indigo-500 shadow-sm">
                        <option value="All">All Providers</option>
                        <option value="Public">Government / Public</option>
                        <option value="Private">Private / VC</option>
                        <option value="Bank">Bank / Institutional</option>
                    </select>
                </div>
            </div>

            <button onclick="resetFilters()" class="w-full py-5 border-2 border-dashed border-slate-200 rounded-3xl text-[10px] font-black text-slate-400 hover:bg-white hover:border-indigo-200 hover:text-indigo-400 transition uppercase tracking-widest">Clear All Filters</button>
        </aside>

        <div class="flex-1">
            <h2 id="count-label" class="text-3xl font-[900] text-slate-900 tracking-tight mb-8">Schemes Available</h2>
            <div id="grants-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
            <div id="no-results" class="hidden text-center py-32 bg-white rounded-[3.5rem] border-4 border-dashed border-slate-100">
                <div class="text-7xl mb-8 opacity-20">🔎</div>
                <p class="text-slate-400 font-bold text-2xl mb-10">No matching schemes found.</p>
                <button onclick="resetFilters()" class="bg-indigo-600 text-white px-12 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-2xl shadow-indigo-200 hover:bg-indigo-700 transition">Show All Schemes</button>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        const typeCategories = ["Loan", "Subsidy", "Equity", "Grant"];

        async function loadData() {
            try {
                const res = await fetch('grants.json');
                rawData = await res.json();
                console.log("Data Loaded Successfully");
            } catch (e) { console.error("Could not load grants.json"); }
            filterData();
        }

        function isPhoneticMatch(str, target) {
            if (!str) return false;
            const s = str.toLowerCase().replace(/h/g, '');
            const t = target.toLowerCase().replace(/h/g, '');
            return s.includes(t) || t.includes(s);
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const indFilter = document.getElementById('industryFilter').value.toLowerCase();
            const secFilter = document.getElementById('sectorFilter').value.toLowerCase();
            const checkedTypes = Array.from(document.querySelectorAll('#typeFilters input:checked')).map(c => c.value.toLowerCase());

            let filtered = rawData.filter(item => {
                // Search Logic
                const matchesSearch = !search || isPhoneticMatch(item.name, search) || isPhoneticMatch(item.provider, search);
                
                // Type Logic
                const itemType = (item.type || "").toLowerCase();
                const matchesType = checkedTypes.length === 0 || checkedTypes.some(t => itemType.includes(t));

                // Fuzzy Industry Mapping (Crucial Fix)
                const itemInds = Array.isArray(item.industry) ? item.industry.map(i => i.toLowerCase()) : [(item.industry || "all").toLowerCase()];
                const matchesInd = indFilter === "all" || itemInds.some(i => i.includes(indFilter) || indFilter.includes(i));

                // Fuzzy Sector Mapping
                const itemSec = (item.sector || "public").toLowerCase();
                const matchesSec = secFilter === "all" || itemSec.includes(secFilter.split(' ')[0]);

                return matchesSearch && matchesType && matchesInd && matchesSec;
            });

            updateSidebar(checkedTypes, search, indFilter, secFilter);
            renderGrid(filtered);
        }

        function updateSidebar(checked, search, ind, sec) {
            document.getElementById('typeFilters').innerHTML = typeCategories.map(type => {
                const count = rawData.filter(item => {
                    const itemType = (item.type || "").toLowerCase();
                    const itemInds = Array.isArray(item.industry) ? item.industry.map(i => i.toLowerCase()) : [(item.industry || "all").toLowerCase()];
                    const mType = itemType.includes(type.toLowerCase());
                    const mInd = ind === "all" || itemInds.some(i => i.includes(ind));
                    const mSec = sec === "all" || (item.sector || "public").toLowerCase().includes(sec.split(' ')[0]);
                    const mSearch = !search || isPhoneticMatch(item.name, search);
                    return mType && mInd && mSec && mSearch;
                }).length;

                return `
                <label class="flex items-center justify-between p-4 bg-slate-50 border-2 border-transparent rounded-2xl cursor-pointer hover:bg-white hover:border-indigo-100 transition mb-2">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="${type}" ${checked.includes(type.toLowerCase()) ? 'checked' : ''} onchange="filterData()" class="w-6 h-6 rounded-lg text-indigo-600">
                        <span class="text-sm font-extrabold text-slate-700">${type}s</span>
                    </div>
                    <span class="text-[11px] font-black ${count > 0 ? 'text-indigo-500' : 'text-slate-300'} bg-white px-2 py-1 rounded-lg">${count}</span>
                </label>`;
            }).join('');
        }

        function renderGrid(data) {
            const grid = document.getElementById('grants-grid');
            const noResults = document.getElementById('no-results');
            document.getElementById('count-label').innerText = `${data.length} Schemes Available`;
            
            if (data.length === 0) {
                grid.innerHTML = ""; noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                grid.innerHTML = data.map(item => `
                    <div class="grant-card">
                        <div class="flex justify-between items-start mb-8">
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-4 py-2 rounded-xl uppercase tracking-widest">${item.sector || 'Government'}</span>
                            <p class="text-[#10b981] font-black text-2xl tracking-tighter">${item.amount}</p>
                        </div>
                        <h3 class="text-2xl font-black text-slate-900 leading-tight mb-3">${item.name}</h3>
                        <p class="text-slate-400 text-[11px] font-bold uppercase tracking-[0.2em] mb-10">${item.provider}</p>
                        <div class="mt-auto pt-8 border-t border-slate-50 flex items-center justify-between">
                            <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest">${item.type}</span>
                            <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-indigo-600 shadow-lg shadow-indigo-100 transition">Apply Now</a>
                        </div>
                    </div>
                `).join('');
            }
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('industryFilter').value = "All";
            document.getElementById('sectorFilter').value = "All";
            document.querySelectorAll('#typeFilters input').forEach(c => c.checked = false);
            filterData();
        }

        loadData();
    </script>
</body>
</html>
