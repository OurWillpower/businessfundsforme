<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Funds For Me | Startup Grant Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-white border-b border-slate-200 py-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center">
                <div class="flex items-center gap-6">
                    <img src="logo.png" alt="Willpower Official" class="h-24 w-auto object-contain transition-transform hover:scale-105 duration-300" onerror="this.style.display='none'">
                    
                    <div class="hidden md:flex flex-col border-l-2 border-slate-200 pl-6">
                        <span class="font-black text-slate-800 tracking-tighter text-2xl leading-none">BusinessFundsForMe</span>
                        <span class="text-[11px] text-indigo-600 font-bold uppercase tracking-[0.2em] mt-2">The Willpower Initiative</span>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-4 items-center">
                <a href="https://github.com/OurWillpower" target="_blank" class="bg-slate-900 text-white px-8 py-3.5 rounded-2xl text-sm font-black hover:bg-indigo-600 transition shadow-xl shadow-slate-200">Submit Grant</a>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-900 pt-20 pb-32 px-6 text-center relative overflow-hidden">
        <div class="relative z-10">
            <h2 class="text-5xl md:text-7xl font-extrabold text-white mb-6 tracking-tighter leading-tight">Find Funding for <br> Your Startup</h2>
            <p class="text-indigo-100 text-xl max-w-2xl mx-auto mb-14 opacity-90 leading-relaxed font-medium">Curating 50+ high-impact Government and Private schemes for Indian Entrepreneurs.</p>
            
            <div class="container mx-auto max-w-4xl">
                <div class="bg-white p-2.5 rounded-[2.2rem] shadow-2xl flex flex-col md:flex-row gap-2 border-4 border-white/10">
                    <div class="flex-grow flex items-center px-6 bg-slate-50 rounded-[1.6rem]">
                        <i class="fas fa-search text-slate-400 mr-4"></i>
                        <input type="text" id="searchInput" placeholder="Search by name, provider, or industry..." class="w-full py-5 bg-transparent outline-none text-slate-700 font-bold text-lg">
                    </div>
                    <select id="filterType" class="bg-slate-100 p-5 rounded-[1.6rem] outline-none font-black text-slate-700 border-none cursor-pointer hover:bg-slate-200 transition px-8">
                        <option value="All">All Categories</option>
                        <option value="Grant">Grants</option>
                        <option value="Loan">Loans</option>
                        <option value="Subsidy">Subsidies</option>
                        <option value="Accelerator">Accelerators</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-indigo-500/20 via-transparent to-transparent"></div>
    </header>

    <main class="container mx-auto px-6 py-20">
        <div id="grants-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <footer class="bg-white border-t border-slate-200 pt-20 pb-12">
        <div class="container mx-auto px-6 text-center">
            <div class="flex flex-col items-center">
                <div class="mb-8">
                    <img src="logo.png" alt="Willpower" class="h-20 w-auto opacity-80 hover:opacity-100 transition-opacity">
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-2 italic">"Atma-shakti Muladhanam"</h3>
                <p class="text-slate-400 text-xs font-black tracking-widest uppercase mb-10">Trusted since 2012</p>
                
                <div class="w-full max-w-md h-px bg-slate-100 mb-10"></div>
                
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">© 2026 BusinessFundsForMe. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        let allGrants = [];
        async function fetchGrants() {
            try {
                const response = await fetch('grants.json');
                allGrants = await response.json();
                renderGrants(allGrants);
            } catch (e) {
                document.getElementById('grants-grid').innerHTML = '<div class="col-span-full text-center p-20 text-red-500 font-black">DATABASE CONNECTION ERROR</div>';
            }
        }

        function renderGrants(data) {
            const grid = document.getElementById('grants-grid');
            grid.innerHTML = data.length ? '' : '<div class="col-span-full text-center py-20 text-slate-400 font-bold">No matches found in our directory.</div>';
            data.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-100 hover:shadow-2xl transition-all duration-500 flex flex-col group">
                        <div class="flex justify-between items-start mb-8">
                            <span class="bg-indigo-50 text-indigo-700 text-[10px] px-4 py-1.5 rounded-full font-black uppercase tracking-widest group-hover:bg-indigo-600 group-hover:text-white transition-colors">${item.type}</span>
                            <span class="text-[10px] font-black text-slate-300 uppercase">${item.deadline}</span>
                        </div>
                        <h3 class="text-2xl font-black text-slate-900 mb-4 leading-tight">${item.name}</h3>
                        <p class="text-slate-500 text-sm mb-10 flex-grow leading-relaxed font-medium">${item.provider}</p>
                        <div class="pt-8 border-t border-slate-50 flex justify-between items-center">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Max Benefit</span>
                                <span class="text-3xl font-black text-green-600 tracking-tighter">${item.amount}</span>
                            </div>
                            <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-7 py-3.5 rounded-2xl font-bold hover:bg-indigo-600 transition text-sm">Apply</a>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderGrants(allGrants.filter(g => g.name.toLowerCase().includes(term) || g.provider.toLowerCase().includes(term)));
        });

        document.getElementById('filterType').addEventListener('change', (e) => {
            const type = e.target.value;
            renderGrants(type === 'All' ? allGrants : allGrants.filter(g => g.type.includes(type)));
        });

        fetchGrants();
    </script>
</body>
</html>
